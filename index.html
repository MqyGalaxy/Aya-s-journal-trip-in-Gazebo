<!doctype html>
<html>

<meta charset="utf-8">
<title>寂静的幻想乡</title>
<style type="text/css">
a {
    font-family: Segoe, "Segoe UI", "DejaVu Sans", "Trebuchet MS", Verdana, sans-serif;
}

@font-face {
    font-family: WenYue;
    src: url("font/WenYue-XinQingNianTi-NC-W8-1.otf")
}
	.font {
		font-family: WenYue;
		color: #fff;
	}
body,td,th {
    font-family: Segoe, "Segoe UI", "DejaVu Sans", "Trebuchet MS", Verdana, sans-serif;
}
body {
    background-color: #363636;
}

.f1_dot_bg{
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  width: 100%;
  background-image: url("img/e220175d777b571abf09bd549ab45f432883124f.png");
  filter:brightness(80%);
  background-repeat: repeat;
  background-size: cover;
  background-position: center top;
  opacity: 0.8;
  background-color: rgba(0,0,0,0.35);
}
.about_f1_box{
  color: #ffffff;
}
.l-inner.character-box{
  padding: 70px 100px 185px;
}
.l-inner{
  width: 1000px;
  padding: 100px;
  position: relative;
  margin: 0 auto;
  zoom: 1;
}
	
.top ul{
    /* 清除ul标签的默认样式 */
    width: 1000px;/*宽度也改为自动*/
    list-style-type: none;
    white-space:nowrap;
    overflow: hidden;
    margin-left: 5%;
    /* margin-top: 0;          */
    padding: 0;

}
.top li {
    float:left; /* 使li内容横向浮动，即横向排列  */
    margin-right: 3%;
    margin-left: 3%;  /* 两个li之间的距离*/
    position: relative;
    overflow: hidden;
}
	.top ul li{
		display:inline-block;
	}
.link_box a {
  display: block; 
  color: #FFBA11;
  text-decoration: none;
  border: 2px solid #FFBA11;
  border-radius: 30px;
  text-align: center;
  line-height: 1em;
  font-size: 20px;
  padding: 11px 0;
  letter-spacing: 0.05em;
  font-family: "MetropolisRegular", sans-serif;
  transition: .3s;
  -moz-transition: .3s;
  -webkit-transition: .3s;
  -o-transition: .3s;
  width: 250px
}
.link_box a:hover{
  background-color: #FFBA11;
  color: #fff;
}
.sc_staff .staff_list1 .name {
  font-size: 20px;
  font-family: "NotoSans-bold", sans-serif;
  line-height: 1.1em;
}
</style>
</head>

<body>
	<div id="loading"></div>

    </div></div>
	<div class="l-inner character-box">
		<div class="about_f1_box" style="text-align: center;">
		     <p class="font" style="font-size: 50px; text-align: center;">这是一份来自<span style="color: #FFCE55">幻想乡</span>的档案</p>
		</div>
		<div class="top" style="text-align:center;">
			<ul class="staff_list1" style="display:inline-block; vertical-align:top;">

				</li>
				<li class="link_box">
					<p class="name"><a>射命丸文的酉间坊纪行</a></p>

				<li class="link_box">
